name: Slack Notification

on:
  workflow_call:
    inputs:
      status:
        description: 'Job status (success, failure, cancelled)'
        required: true
        type: string
      environment:
        description: 'Deployment environment'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA'
        required: true
        type: string
      actor:
        description: 'User who triggered the workflow'
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "GitHub Action: ${{ inputs.status }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "Deployment Update",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Status:*\n${{ inputs.status == 'success' && '✅ Success' || (inputs.status == 'failure' && '❌ Failure' || '⚠️' ) }} ${{ inputs.status }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Environment:*\n${{ inputs.environment }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Actor:*\n${{ inputs.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<https://github.com/${{ github.repository }}/commit/${{ inputs.commit_sha }}|${{ inputs.commit_sha }}>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
