name: PR Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  build-and-deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup & Build
        uses: ./.github/workflows/setup.yml
        with:
          node-version: '20.x'
          
      - run: npm run build
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Preview
        run: |
          PR_NUMBER=${{ github.event.number }}
          BUCKET_NAME=${{ secrets.PREVIEW_S3_BUCKET }}
          aws s3 sync build/ s3://$BUCKET_NAME/pr-$PR_NUMBER/ --delete

      - name: Post Preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const bucketName = '${{ secrets.PREVIEW_S3_BUCKET }}';
            const region = '${{ secrets.AWS_REGION }}';
            const url = `http://${bucketName}.s3-website-${region}.amazonaws.com/pr-${prNumber}/`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 PR Preview is ready: [View Preview](${url})`
            })

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Delete Preview
        run: |
          PR_NUMBER=${{ github.event.number }}
          BUCKET_NAME=${{ secrets.PREVIEW_S3_BUCKET }}
          aws s3 rm s3://$BUCKET_NAME/pr-$PR_NUMBER/ --recursive
